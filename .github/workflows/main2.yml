name: Butterfly Modern Terminal with Cloudflared

on:
  workflow_dispatch:

jobs:
  terminal:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create user 'ash' with password
        run: |
          sudo useradd -m -s /bin/bash ash
          echo 'ash:root' | sudo chpasswd
          sudo usermod -aG sudo ash
          echo "User 'ash' created successfully"

      - name: Install Python and pip
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-tornado libffi-dev
          echo "Python installed successfully"

      - name: Install Butterfly (Modern Terminal)
        run: |
          pip3 install butterfly
          echo "Butterfly installed successfully"

      - name: Add Cloudflare GPG key
        run: |
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null

      - name: Add Cloudflare repository
        run: |
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list

      - name: Install cloudflared
        run: |
          sudo apt-get update && sudo apt-get install -y cloudflared
          echo "Cloudflared installed successfully"

      - name: Install cloudflared service
        run: |
          sudo cloudflared service install eyJhIjoiY2U5MWFiYmQyYWU3YjhlZjQxMmU0YWQxODJmYzUxYzciLCJ0IjoiMzYwNDk1MzYtMGQzYS00MjQ0LWEyMDQtODBkYjM4ODRmZjIzIiwicyI6Ik56UXdPREptWkdVdE9HTXhNeTAwTVRkbUxXRTBOamd0TURnMVpUSXpNV0V5TlRBeCJ9

      - name: Start cloudflared service
        run: |
          sudo systemctl start cloudflared
          sleep 3
          echo "Cloudflared service started"

      - name: Start Butterfly on port 8080
        run: |
          # Start butterfly - ultra modern cutiee terminal replacement
          butterfly.server.py --host=0.0.0.0 --port=8080 --unsecure 2>&1 &
          sleep 8
          
          if pgrep -f "butterfly" > /dev/null; then
            echo "================================"
            echo "✓ Cutiee Ultra Modern Terminal!"
            echo "================================"
            echo "Port: 8080"
            echo "Username: ash"
            echo "Password: root"
            echo ""
            echo "Features:"
            echo "✓ Beautiful modern UI"
            echo "✓ Perfect mobile experience"
            echo "✓ Touch gestures support"
            echo "✓ Multiple tabs"
            echo "✓ Themes & customization"
            echo "✓ File browser included"
            echo "✓ Syntax highlighting"
            echo "✓ Responsive design"
            echo "================================"
          else
            echo "ERROR: Cutiee terminal failed to start"
            exit 1
          fi

      - name: Display system information
        run: |
          echo "================================"
          echo "System Information:"
          echo "================================"
          echo "OS: $(lsb_release -ds)"
          echo "Kernel: $(uname -r)"
          echo "Architecture: $(uname -m)"
          echo "CPU Cores: $(nproc)"
          echo "Total RAM: $(free -h | awk '/^Mem:/ {print $2}')"
          echo "Available RAM: $(free -h | awk '/^Mem:/ {print $7}')"
          echo "Disk Space: $(df -h / | awk 'NR==2 {print $4 " available"}')"
          echo "================================"
          echo ""
          echo "Access via Cloudflare Tunnel"
          echo "================================"

      - name: Keep alive for 6 hours
        run: |
          echo "Session will remain active for 6 hours"
          echo "Started at: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo ""
          
          for i in {1..360}; do
            sleep 60
            
            if ! pgrep -f "butterfly" > /dev/null; then
              echo "⚠ WARNING: Cutiee terminal stopped, restarting..."
              butterfly.server.py --host=0.0.0.0 --port=8080 --unsecure &
              sleep 5
            fi
            
            if [ $((i % 30)) -eq 0 ]; then
              hours=$((i / 60))
              minutes=$((i % 60))
              echo "✓ Status: Active - ${hours}h ${minutes}m elapsed - $(date '+%H:%M:%S')"
            fi
          done
          
          echo ""
          echo "Session completed at: $(date '+%Y-%m-%d %H:%M:%S %Z')"
